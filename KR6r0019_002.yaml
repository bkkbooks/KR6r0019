body:
  text: 玉岡潤法師法嗣法師必才字大用姓屈氏台之臨海人父哲明經為科目之儒母趙崇佛惟謹夜夢神僧振錫臨門覺而生師甫能言輒記孝經一卷七歲能屬句年十二聞越之嵊縣報恩寺為剡源先法師講肆之地遂往從西江翟公出家祝髮受具戒十六謁湛堂澄公於南竺渲福一見即以法器期之命典客寮時玉岡潤公居版首乃執經入室足不出戶限者十年凡山家部味教觀一經指授意釋心融玉岡嘆曰子非靈山宿習焉能致此哉一時儔輩如我菴無絶宗繼英聲偉望絶出時流至於剖決宗旨議定教章必推師為上首玉岡住當湖德藏延師分座泰定甲子玉岡謝去以師繼席至正壬午遷杭之興福明年又升演福首造大佛寶殿山門兩廡及彌顯之堂萬佛寶閣其金碧晃朗像設尊嚴法筵之盛特冠諸剎師惟以講說流通為務所有資施隨得隨散故其營構之績不勞而就帝師聞其高行錫佛鑑圓照大師之號江浙函相達公纍致香幣咨決法要一時貴人畯士罔不傾誠致敬然師以觀行精勵雖祁寒隆暑不虧其程忽示微疾即杜門謝絶人事厲𫁉佛號聲不暫輟謂其徒曰人生一世要在末後一著汝等勿謂修持無驗吾淨土緣稔今將行矣即具浴更浴更衣書偈以別丞相及知者端坐合掌而逝己亥三月十九日也闍維之日千衆聚觀火已舌本齒牙不舍利如菽人爭拾之門人立塔于寺南安養世壽六十八僧夏五十六師為人持重寡言笑至其為衆說法雨注河翻縱橫無礙其著述有妙玄文句止觀三大部增治助文法華涅槃講義章安荊溪四明三祖禮文得法者上竺大山下竺良玉白蓮明德普福元鎮能仁久懷法師普曜號天岩世為嘉禾雲泉之陸氏父祥母章感異夢而娠生而政嶷眉目如繡讀書成誦輒得大旨年十三依能仁義朗十六落髮寺之長德菴才公家規嚴峻具禮幣使從明師故早能詩仇先生仁遠白先生珽俱異之玉岡潤公居東湖演壽師從學天台教觀若宿習然玉岡語之曰子它日必為法器第吾老且盡不能終子之業於是又從松壑壽公究明一心三觀之旨令與宗勝修大悲三昧期師於夢中登大塔之頂榜曰常樂因悟曰諸佛境界也明日閲起信論至更無彼此色相迭相見唯一真如智獨存恍然有得自是辨說無礙演福竹居簡公延掌僧籍圓覺雲海度公招領其衆所至有聲至正二年宣政院起主車溪廣福乃建法華懺院寺之東偏繼修懺法歲以為常修多寶塔新方丈室興廢補弊學徒雲委十有七年謝皈結庵曰夢蓮修淨土行為終焉之計湖郡守請主慈感居三年值歲凶乞食聚徒講授不輟及遷演福僅三月而有臺城之役偶微疾有問者師曰數至於此孰能逃之加趺燕坐而逝龕留三日神色不變茶毗舌本如青蓮華葉數珠牙齒舍利如貫珠悉為人取去五郡同役及四方之人無不傷悼師嘗造千手眼大悲像事之終身恆祝曰使我得一句一偈大法之益悉以施人故能隨機應器動臻其妙主法華彌陀懺期三十又七會講法華終三遍壽公命書銀字般若經藏諸正法樓不過中食者數年喜賓客不問有無臨患難處之晏然僧道立皈遺骨於新溪之上春秋六十僧夏四十五嗣法者定覺處仁法師正壽號松壑俗姓徐氏霅之鳥程人父應炎家傳儒師自幼厭處塵俗出家於南竺演福從柳塘權公得度誦經禮佛晝夜不輟食不過中脅不至席嚴持禁戒彌久益堅至治辛酉玉岡潤公來住是山聞其妙教即立妙行道譽月廣遂升座端為學者師衆數百人隨機開示未嘗少倦江湖道俗爭欲得師出世師之母賢而有識每戒之曰慎勿住院纍我乃恪導母訓方以聘幣來者語皆峻拒不納而於自行之功愈加精進行四三昧終而復始有施以財物者輒均分之於衆以己所得贖禽魚以放生泰定甲子建真如觀堂於杭城之北母盡出其奩具以資役費堂成奉安千首眼觀音像歲以季秋之月集同行人修大悲懺三七日別立普賢道場歲修法華三昧搆重閣庋置金書般若經銀書大智度論於其上而闢下為講堂師凡演法往往感天神侍座天雨寶華至正二年二月示疾語衆曰佛涅槃前一日我當去為我建淨土期以助西歸十三日沐浴更衣端坐達旦廣說觀心觀佛淨土法門䇿勵學徒安然而逝世壽五十三僧夏三十五茶毗日於火輪中放金色光遺燼中舌根不壞舍利無數塔于觀堂之右嗣法者得禹法師子實字印海號相庵姓仲氏嘉興奧溪人母感異夢有娠生而頴異十三依海鹽祇園寺勒公出家厭棄瑜伽專誦儒典十九祝髮進具聞玉岡說法於演壽往詢法要玉岡留之授以天台諸書令熟誦之玉岡遷演福招師掌僧事嘗修觀音期七七日夢感大士剖腹裁心從而聰利後居白蓮華院獲授止觀續看妙玄辨才宏肆玉岡繼升下竺靈山師亦從焉大用才公遷演福延師居版首後歸祗園建懺堂歲啓期懺略感靈瑞嘉興守請住當湖德藏洪武三年詔徵天下高僧至京奏對𫁉旨復歸奧溪福嚴十一年詔令天下僧講楞伽金剛心經師於海鹽天寧敷暢厥旨多所弘益十五年竺隱道公升上竺請師居都講之職明年僧録司選師住下竺前後七載講說諸部連環無已復退休奧溪甫歲周遍別鄉鄰故舊往居德藏忽一日賦懷淨土辭一篇端坐稱佛名而逝洪武二十四年辛未九月二十五日也春秋七十八夏五十九門人收舍利塔于飛來峯之陽師平居持戒甚嚴動靜語默不違其教於山家諸部精研力索不極其妙不止凡學者有所啓問莫不懇懇為言其指歸所至聽衆雲集用能扶樹教道為一時所宗所著有楞嚴略疏圓覺文句楞伽指南金剛般若燈論心經遺經疏四分戒本鈔四教儀正說解指要問津金錍起文所修法華期懺十有七會金光明期二十三彌陀淨土期五請觀音五大悲三常坐三昧二皆獲禎應得法者法喜道怤仁讓一奇如秩妙解法師大佑字啓宗別號佑蘧菴出於姑蘇吳縣之吳氏父母俱持齊素鄉里稱為善人其母夢一僧自稱闍那覺而遂孕始能言聞其兄誦楞嚴呪即隨口誦之年十二出家投嗣貴落剃為僧授滿分戒凡內外經書一覽即通其義初與古庭為友習賢首教次從皋聲公習天台止觀後於弘教天泉澤公會中充懺首職一日閲玉岡四教儀集注至初五品位一隨喜品注文云一空一切空三觀悉彰破相之用一假一切假三觀悉彰立法之功一中一切中三觀悉是絶待之體忽有省自後天台一宗綱格諸書若素習而貫通焉出世甫里之白蓮遂遙稟玉岡洪武四年以高僧召至京明年預廣薦法會於蔣山洪武十年升住郡之北禪講心經金剛楞伽三經提挈奧義多士悅隨施者坌集乃建大佛寶殿既成將靜退還山適嘉定耆緇現無隱請師開山邑之圓通今為講剎之首未幾歸西山築室扁曰真如修習念佛三昧未嘗暫輟洪武二十六年僧録司缺官召至京陛見喜嘆留長于逾月授僧録司右善世二十九年升左善世居官應制諸作存焉是年考試天下僧徒師扶樹之績居多欽賜袈裟衣衾鞋履鈔貫有差三十二年告老還姑蘇舊業永樂三年夏復召至京有詔纂修釋書師總括般若要義藁成忽稱微疾至五年春正月二日趺坐而逝世壽七十四僧臘六十二是月十八日闍維時祥雲五色天華散空雲鶴盤旋于上火後得舍利無算所著有淨土指歸注解彌陀金剛二經挍勘天台授受祖圖撰法華撮要圖淨土解行二圖淨土真如禮文華嚴燈科淨土九蓮燈科各一卷得法弟子慧徹德完子庭訓法師法嗣法師慧日號東溟天台赤城人宋丞相賈魏公諸孫志慕空門往縣之廣嚴寺依平山等公落髮為僧時子庭講衡台之教於赤城走輪下而受其說依科指授便能領義一旦假𥨊也見有竹橫地下竹上所凝者白粥粲然師因臥而餐之及覺言於子庭子庭曰竹粥與竺同音子得就地以食其緣殆在上下兩竺之間乎子宜亟行行即持瓶錫渡浙河拜竹屋淨公於上竺輒留之所處頗卑濕師賦詩以述其事竹屋見之謂衆曰此即不凡它日當嗣主茲山不可以少年易之為遷剛燥之地遇之如賓友會有營繕之役施金帛者接蹱而至勤舊僧㭄欲揭示名字選工書者卒無以應師揚袂出曰吾試為之霞布雲舒精采煥發竹屋喜曰吾前言不繆命典賓客尋掌僧籍竹屋既示寂湛堂自演福來繼其席師延居後堂版首未幾出世吳山後甚聖水湛堂念之不忍舍復招還山處第一座以儀表四衆聽學之士動以千百計師隨其性竇淺深而疏導之元重紀至元四年行宣政院采諸人望而師復住薦福歷三寒暑下竺靈山寺灾至正元年宣政院使高公納麟謂非師無以膺起廢之任移師蒞之師至修普賢殿雲間大姓蔡氏邀師至家施錢十萬緡師過姑蘇大致香楠為材既而大雄殿成蔡卒其妻夏氏為刻佛菩薩羅漢聖像黃文獻公溍實為之記四年高公又遷師住上竺子庭所謂上下兩竺之徵益驗矣師知緣契在茲夙夜注心罔敢怠遑初修大殿次建山門鑄鐘搆樓次營重閣講堂上祠諸祖下為講法之所它若白雲堂選佛場諸寮宇亦皆告成復罄己槖甓通途自普門達于三門寺所宜有無不具焉帝師大寶法王嘉師之行賜以金襴法衣及慈光妙應普濟大師之號十六年檛鼓而退隱於會稽山水間人不知其為師江浙丞相達識帖穆公力請還山復再正法席前後凡二十五年國朝革命鴻仁惠澤覃及幽明於是有學僧伽奉詔入京而師年最高白眉朱顏其班前列上親問以升濟沉冥之道師備述其故上悅顧衆而言曰邇來學佛者唯沉埋歲月如金剛楞伽諸經皆撮心之要典何不研窮其義苟有不通質諸白眉法師可也自後數召見字而不名人以為師榮及建鐘山法會請師說毗尼淨戒聞者開悟洪武五年正月望也時輿論以瓦官升元講寺乃天台初釋法華道場不可久廢乃以其事上聞即天界禪林別建堂室以存舊號請師開山師為升堂說法九府僧伽皆俯首以聽風聲所被遐邇翕然復辭歸天竺山日修西方淨業十二年秋七月朔日夢青蓮華生方池中清芬襲人既寤召弟子曰此生西方淨土之祥也吾去人間世殆不遠乎至四日書偈合爪而逝世壽八十又九僧臘七十三塔全身於西峰妙應塔院師居常顏面嚴冷片言不妄發雖對王公大臣未嘗出一軟媚語至於誘掖後進辭色溫如春陽嗣其法者思齊行樞妙修允鑑允忠普智文會一即善述等松林溥法師法嗣法師子思字齊賢別號四窗明之奉化陳氏父德母湯夢梵僧乘白馬闖門而娠骨相殊異甫五歲向佛膜拜如敬二親法華念公時住寶山俾以童子趨侍獲與名師宿儒往來見聞日益剃髮於弱冠之初登具於年滿之後遂發迹南湖抗聲西浙松林演唱於集慶也師以習讀之勤記憶之富講辨之詳歷僧事懺司座端之職以佐其化板刻盤谷類要六十卷而出世台之保壽作門及堂湖之慈感則建堂而閣其上甃隄岸築垣墻供營繕置廩局集慶之廢師以舊遊地有志興起奪於上竺之選唯作廊廡二十楹上竺南竺二大殿或成於將代之際或丁於久之餘君乃刺血書經煉指供佛祈雨而雨澍禱疾而疾瘳此其餘事也至正初僧寺困於民役會中臺御史抵杭因上書言幣請奏乞以津貼法使諸山畝計田土其資費然庶免其徵科之𥣯果獲所請至正辛丑二月十日書偈辭世善手無夢贊之曰師以即具之宗鼓行斯世以明靜之旨陶冶後人祖碧溪而同驅並駕父松林而絶類離倫苟非為太平而出則必因聖哲而臻者焉桐溪濟法師法嗣法師普容字太虗俗姓弟氏世為餘姚人年十四出家於里之嶼山祝髮於杭之昖慶受具戒於明之開元碧溪聞公住延慶日師久依之復得止觀法門於桐溪濟公雪岑說偈請主觀事乾符久廢半岩全公北溪謙公咸諉以與造師為募施者建寺買田六百畝與寺別籍作九品觀室居焉郡人福清州判官楊為搆精舍請于朝賜額曰慈濟且加法師號俾師開山師黽勉受命而仍居乾符寺俄舉淨業會與衆別又明日示寂春秋七十夏四十四延祐七年二月一日也奉全身塔于慈濟東南太史黃溍為之序曰師家故業儒詩禮之學厥有端緒今不言尊其教也粵自大雄唱滅殊師異旨莫適統一惟天台之傳為傳其宗而學者或梏於章句有教無行師益病之是故一年修常坐二年修長行餘時則修半行坐非行坐凡然其頂者三爇其臂者百閲七年而四三昧以具既又集同行修大悲期一淨土期七年寓公處士慕而與遊輒為舉東林故事四衆從之為四十八願會者恆數十百人所著書唯圓修要義一卷歲大饑且疫為粥活其所不能自食者用闍維法斂送其死無所歸者慶元路總管張賅以旱告師為合同修六十人詣白衣觀音像前肉香祈哀感瑞光如瓔珞雨三日乃止駙馬都尉瀋陽王謁補陀道出四明膜拜執弟子禮請主如意輪期三七日尋獲異夢蓋申敬事此皆世之所共稱者也天泉澤法師法嗣法師祖禰字曰章晚號用拙蘇之常熟張氏子年十二出家福山大慈寺聰敏秀發絶出儕類凡真乘外書過目不忘十七祝髮進具戒初謁天泉於北禪一見器之即令入室繼掌僧事復東遊四明時我菴無公住延慶石室英公居育王皆待以忘年友既首衆報慈又居上竺座端出世郡城之永定遷崑山廣孝嘉定淨信洪武二年善世院遷住杭之上竺以高僧選留瓦官寺有旨就天界禪寺升座聞者悅服數召入禁中問佛法大意師奏對詳允敕止宿翰林院以備𮨇問八年秋得旨還山營別業於蘇城東扁曰安隱緇白嚮慕者衆十二年八月十二日示疾臨終不及它事惟力疾念佛而化春秋七十一夏五十四茶毗日送者聞異香火滅其骨成五色孫德完收爐餘即安隱起塔得法者覺斯純妙師之為學也一家所傳教觀章疏必精撢極究不暢達不止為學講授不泥章句聽者忘倦至於博覽強記對客授引亹舋不休尤為翰林宋公侍講公所知又善任㩲智如上竺為江南宗剎衆號難齊而能處之泰如可謂真俗兼濟者矣我庵無法師法嗣法師弘道宗竺隱存翁其別號也世居姑蘇吳江之澄源里沉姓初有異人過其居言它相當出高僧既而師生甫及睟能稱佛名母沒鞠於嫂氏始就外傳讀書日記數千言厥父以青鎮密印寺慈公有行業遂命出家其庭忽生竹五竿因命其軒曰五竹而藏修焉十九落髮進受具戒聞西湖雷峯魯山文法師講授有程遂往從之天台諸部一聞即了靡不淹貫會我庵由延慶遷上竺一見若有宿契問曰吾宗部味教觀權實之旨為曾聞耶師曰然曰即文字而求之耶離文字而求之耶曰不即不離遂命掌書記由是聲動湖山未幾我庵示寂去從絶宗於薦福與大璞大徹輩研窮考核其業益精圓覺雲外慶公延師表章其衆時增修教苑清規師秉筆多所更定天巖曜公退席車溪廣福舉師自代洪武初湖郡守請住慈感勉副其意即憣然而退乃築室於漈源額曰無為舍雕造千手眼大悲像昕夕禮誦為終焉之規洪武三年詔天下僧道問鬼神事師建議為多杭人以天竺靈山久廢郡諸山力請乃起重建光明懺堂從是懺法復行十年有旨箋注楞伽等三經師與具庵等同注頒行上親製竺隱說賜之十五年升住上天竺有詔開設僧道衛門師領杭郡都僧綱明年起師為僧録司左善世勑命有曰昨勑見任僧官於萬百千中求同佛心者汝為衆所推而至出萬百千中之上是為希有特命爾為僧之第一掌教九年慈恕清慎宗教賴焉草四年春師以年老告聞許之其年七十七也明年秋天禧夢觀請師為後學講妙宗至三輩往生觀文忽示疾曰吾世緣當謝焉能效悠悠輩作四句辭世偈耶第以山林之質受聖上深恩異遇不能報效而此心常拳拳也言已即泊然而逝實洪武二十五年九月三十日也夢觀為治喪盡禮茶毗烟焰有光得舍利無算至謨等奉靈骨歸葬於檜峯雲隱塔春秋七十八夏五十九師四坐道場所至緇白景從興建善事而靈山懺堂為功最巨居官為郡綱杭僧以安長教府三宗有依怙焉嗣法者慈感道立演福淨盟崇壽淨珠靈山如圭耶溪若法師法嗣法師友奎字方舟會稽人朱姓母相里氏師生而神異額有𣇄文色紅而隆起至四十九日乃隱父因以𣇄名焉十四出家雲門之靈峰投嗣亮得度嘗從舅氏耶溪法師於廣孝旁參斷江恩禪師廣孝至雲峯不數里朝進暮習門學有成人皆器之泰定初耶溪主杭與福復往侍之即能該通性具之學遂擢職賓司又從天岸法師於圓通再領懺事至正二年出住慶元奉化安住不久而回雲門與安陽韓公五峰李公白野泰公結世外之好而靈峯有松風閣往來嘯詠名士日盈其門白野公以師名聞於大寶法王錫以覺海弘慈廣濟之號至正十六年浙坦左相康里公兼行宣政院事起師主天竺靈鷲而耶溪亦升下竺靈山而師弟子兼之亦一時之罕遇也越庚子歲西湖諸寺悉于兵師乃力任興復蓋靈鷲自晉慧理法師指為中天竺國小朵峯因卓錫其地至宋嘉熙中南㵎果公實振起之易離向青烏氏不韙之師以徒消産廢之餘欲還舊觀拓基闢門移㵎疊橋建四華堂築天香室改就元向得全境之勝及修始祖慧理塔復祖田若干頃吳元丁未國朝革命以師住南山旌德未幾浙右諸寺咸以臺雄之役萃南京仆者八九師獨獲全洪武初開善世院總統曇公柄天下僧選首以師住天竺大集慶茲寺實冠諸剎非重望者不可尸之師亦以宗門之重凡寺之虗席者必進賢以主之妄庸冒利者則力排而退之議論之未決者即正色抗言之不避艱險不畏勢位唯當於理而後已人以為有僧中御史之風焉師主是剎四歷寒暑三覲京都洪武戊申自羅蔣山法會即情然勇退有偈曰自笑年來歸去遲天風吹盡桂華枝井西猶有長松樹容我間身聽子規宗人矩公和以成帙惜師之不留也於是結第一庵於鳳山之岩日以念佛三昧自厲亦以此勉人且刊諸圖而流布焉師於內外典籍罔不諳究而尤精於地理之學故人多屈致之而契合者或一往焉泰溪胡氏與師夙好時年六十又六雖力辭衆請而胡氏之召則欣然赴以宿心許之不可移也舟抵其所越二日忽示疾以手書空欲索筆書偈而彼不知之遂奄然而化抑與北峯祖之終頗相類亦緣之有在也經十有一日其徒智誾以師靈骨瘞于包山桃華源實洪武甲寅十月也師凡四董名藍年逾耳順雖狀貌清古而氣節藹然言論慷慨賦性鯁直若無所容及待人接物猶春風盎如也絶宗繼法師法嗣法師如玘字大璞餘姚張氏子母俞夢異僧自言南嶽來遂娠早有出塵之志或啖以魚肉即吐之入塔寺見沙門講誦必傾耳聽告父母願出家十六投橫溪普安寺覺海為師以饒梵為業頗鄙之聞我庵無公唱道明之延慶即往依之無公給牒度為僧初受具戒習台乘諸書時我庵遷上竺絶宗繼公亦住薦福乃渡江依繼公隨衆授小部文而疑未解聽講別行玄義問緣了既具性德善還具性德惡否答曰具繼公曰四明記云只一具字彌顯今宗師釋然有悟後號具庵進閲大部諸書務曲暢旁通以會于一繼公遷台之能仁師從行始典賓司復領懺事留五夏仍依大用才公於演福繼公亦謝能仁事與才公為賓主素相推重師自慶得所依歸闢一閣曰明白日務精進不獨教觀探其奧至於外典亦皆究其異同至正辛丑出世雲門之雍熙東溟日公住上竺請師居第一座未幾升住永壽洪武初開善世院選師住普福歲庚戌上將修𨤲事以鬼神之道茫昧召高僧講究師奏疏稱旨四年辛亥善世院罷天界領事者以師升演福學者慕之羸糧景從五年壬子上將覃恩幽滯召天下高僧畢集鐘山設廣薦會法儀甚盛大駕親臨沙門上首分番說法師講法華妙旨聞者悅服上以初度僧罔知佛意俾習楞伽等三經又慮其昧於字義命師與天界泐師同箋注進經御覽尋命鏤板流布使僧徒習之又五年壬戌復立僧録司設官八員左講經其一也而員居第五召師授之明年左善世以事去職召師居之固讓不敢當旦日天禧成須御領之潭王之出閣也上欲以佛理導之居天界寺從師說經並台乘要義王亦待以師禮洪武十八年十一月十七日示寂訃聞於上入龕二日上親製祭文遣官來祭者再親王及公侯貴人亦如之闍維日送者填道弟子一如等函骨歸葬於演福靈石塢壽六十六臘五十四著述有奉敕箋注三經見行于世其偈頌贊疏亦皆粹美師於山家授受的有端緒為學者言縱橫淹貫翰林學士宋公濂擊節嘆賞以為宗教之有人也其上足靈山溥洽今授僧録司右善世兼住天禧講寺次則上竺一如下竺唯實法師自朋字獨菴俗姓郭氏台之臨海人父德文博通儒術母陳氏有賢行師生未齓不屑與群兒戲年十五白父母求出家去禮四明西壽昌寺惟大為師習梵書十七祝髮元統二年受具戒遂至南湖參我庵無公爰覽部文旁通外典次遊上竺見東溟日公粗知要解至正初賢叟思公主集慶署為賓職時薦福絶宗繼公以慧行淑方來咸遲師至因入其室師資吻合已而歸南湖賢叟辟為座端未幾賢叟示寂有禪人挾方氏勢竊據延慶衆爭之不得師去之寶雲借座談經從學益衆久之方悟黜其僭者以迎師師不為起至再四始就凡歷三載即以疾退居慈溪之雲林菴明年正月元日告慧清曰吾報緣垂盡不出十日當去清曰和上慈悲俯徇衆緣師曰最後剎那諸根悉皆散壞惟此願王不相捨離汝其記諸就令出所藏法書名𦘕分送舊往來者囊篋細碎行佐唱禮囑曰清汝無違初出世時無公思公徒囑各請為其師後則曰涅槃堂後見至是唱曰此香培植蓮華峰下發揮指要言前氣息忽然通透至今鼻孔撩天熱向爐中為酬絶宗大和尚法乳之恩又書偈辭衆曰平生出處只隨緣夢幻空華任變遷廓示融通三觀理夕陽依舊在西天書訖溘然而逝洪武三年庚戌正月九日也壽五十五夏三十八其弟子必彰元旻元憲簡廉大用才法師法嗣法師大山字仲齡別號止堂台之臨海梅澳人父陳習母方夢月輪墮懷以裾捧之而孕歲周能隨母念心經聰敏過人年十三父命出家從叔父莊都聞於杭之演福時叢林大盛佛鑑圓照法師才公主之見師氣質度為弟子不朞年法華金光明金剛等經俱能背誦自後習天台教觀沛然若決江河莫之能禦公凡升座提唱即隨記録乃喜曰此子伶俐將來必期有成慎勿怠於學由是大小諸部及外教典籍靡不通究年十八受具戒充侍者轉升維那己亥才公示寂遺言於師曰我去後汝可領衆以傳持末運上竺東溟法師來吊聞有後言即請師歸首座班仍囑曰汝師之命毋卻庚子歲行宣政院以師於五十名中中棲真洪武六年升住大普福越三載遷演福歷十三寒暑巨細事務以身自任力建方丈懺堂佛殿並復富陽沙地皆師之力也洪武十六年詔天下設立講經所命通曉佛法者為衆演說師於城中講經俄聞異香或見天神侍側忽一夕夢至一官府中一人如王者狀賜師坐於左荊山玉法師繼至亦坐于右明日僧録司選住持師住上竺兼領本郡僧綱司都綱職後荊山果住下竺遂符前夢師住上竺凡十年增修後殿兩廈建普門造善財亭移水月樓法器之未具者範銅以鑄雲板佛像之未完者增設大悲像及十六應真甃方丈東西階級重造佛光塔宇刊四教儀正文板並指要詳解瑜伽水陸儀文立僧司則創樓而居之𣇄建觀堂塔院以為藏真之所掌教十五年道俗嚮信宗門賴之壬午六月朔忽言我必辭官解制後歸去七月十七日謂弟子曰我行矣汝等亟稱佛名切勿悲泣亂我正念無疾而化茶毗得舍利有如菽者壽七十二夏五十九塔于白雲峯之麓得法者法師良玉字荊山杭之錢唐人父葛應祥母孫生而頴悟長於常兒年十五能背誦法華經出家於邑之廣福投智圓為師祝髮受具戒深慕佛乘嘗修觀音懺二期誓弘天台之道時南竺演福號為教海師往依才公習諸小部四書粗通大義命歸侍司不二三年一家教觀靡不諳究復命掌僧事歲餘還廣福刻千手大悲像修長期千日一夕其徒大蘭等見懺室發光衆咸驚異戊戌年才公請居座端一衆無不歆豓庚子歲出世安溪長慶時年三十又六越二載退居別室以法華三昧為正軌三七日滿見道場華現衆請復住經十有六載惟以講懺為務西湖永壽虗席諸山以師補之又八年升大普福洪武十九年天禧講寺成上命右講經夢觀法師重開山請師表率萬衆師於夢觀為伯叔行弘贊法門振興斯道可與盛矣又明年工部侍郎黃立恭請住天禧西院時四方多士麇集座下復職都講學者皆有矜式洪武二十四年僧録司舉住下竺靈山大佛寶殿方將鳩工施者坌集不謀而成二十六年左善世夷簡等具師道行奏聞以師補天禧講席上曰既緣熟一方不可動它遂止越明年微有疾十二月二十二日集衆𫁉佛名書偈而逝塔于靈山之陽壽六十九夏五十二師操行端確舉止齊肅至於居大方臨廣衆無有叱咤之聲嚴厲之色而人自悅服之歿後有垂淚者法師元鎮字靜菴松之上海高昌里人其父多善行鄉稱為楊佛子師生而俊特貌魁岸口容奉辛羶未嘗沾唇吻卒聞其氣嘔噦不已人謂其宿習而然九歲依里之安國寺聞公落髮及受具從郡之延慶春洲澤法師習天台性具之學以才見稱授館職既而求進業於當湖德藏才法師見如宿契教觀戶牖如鑰斯啓聲譽日隆命分座代講衆皆悅之出世鳳山之時思居三年謝歸家山嘗以淞湖二郡僧困征徭直走北京白於執政即日上聞詔蠲其役復謁帝者師褒贈佛智妙辨之號江浙左相達爾鐵木爾領行宣政院事有以師之名薦起主杭之西天竺興福學徒四集講貫三載建開山慧光之塔院即退歸安國別築淨住舍因號淨住子專意淨業將終老焉洪武改元之戊申復選天竺大普福未幾五府諸山有臺城之役師以工完得告先歸中途疾作舟至受經書偈而化是年四月二十也壽六十三臘四十七茶毗火皆金色舌根齒牙數珠不燼舍利粲然塔于寺西小峨眉上首弟子天禧守仁為左講經慈感紹宗為右善世靜菴鎮法師法嗣法師紹宗字一元別號遂初松江上海陳氏母程生而秀媚不類羣兒十三出家安國寺禮慧徵為師祝髮受具戒時祖翁靜菴法師住鳳山時思即侍從習台乘諸書就典客寮越三年延慶臻法師延歸懺司未幾江浙丞相以鎮公住西天竺興福又從之究大小部諸書莫不研覃而深味之湖山碩德舉於所司出住越之顯慶時元末兵事擾攘不克渡江移主安溪長慶乃增修佛宇茂植松竹十載之間講誦不輟洪武丙寅僧録司選住湖之慈感寺役煩劇師處之裕如也天禧為講庠淵藪多士輻湊請師居第一座師持規整肅接衆嚴厲升堂入室具合古叢林式人贊之曰三十年無此作今喜見之松江普照為海月都師道場僧録舉師重開山為講剎師以父母之勉從其請既而退歸故林二十六年癸酉師以高僧召赴京上有事於廬嶽命師卒孝子官致謝於天眼固仙時九月一日其夕都佛舒光於天西神燈自五祖道場越大江摩空而下䨱於亭歸復命于朝天顏大悅曰高僧之德感於神明故有如是之驗特補左講經之職賜金縷袈裟及以盛服又謂群臣曰紹宗至誠不懈真君子人也二十八年乙亥復升右善世恩賜如初有加時天禧新造儀軌具有程式唯懺斯未舉師有志於淨土之行乃於西院闢堂立西方三聖像並諸天侍衛之神以紗厨嚴奉之慕同志十人修彌陀期者十晝夜命左善世蘧菴法師主之在京緇素見未曾有以為懺法之興自師而始二十九年丙子除夕忽謂左闡教天禧洽法師曰某纍承恩賜最為優渥曾無涓埃以報聖上深有愧焉俄感風疾一語不能出口越明年正月五日安坐而逝七日上遣神宮監癸于龕所御製其文附馬都尉及僧道録司京剎皆祭焉茶毗於石子岡送者千億人其徒收靈骨歸葬於上海宗國祖塔之左世壽六十僧夏四十五嗣法者能仁智顒竹林志翔等師狀貌清俊襟慶弘遠誠一端莊言不妄發以戒律持身三業精進未嘗少怠凡朝貴見其道義敦厚咸尊敬之以致遭遇聖朝生死榮貴真法門全人也

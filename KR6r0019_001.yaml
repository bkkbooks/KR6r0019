body:
  text: 北峰印法師法嗣法師法照字晦岩台州黃岩大墺人俗姓童氏族聚四百餘年父冕事佛崇善里𫁉童佛生九子師居其次母陳氏夢日𮦒褰裳得之妊十二月乃娩氣貌奇偉耳垂肩眼瞱瞱如電方入小學根器已不凡讀儒書多頴悟年十三繼父志願為僧禮聖水宣公出家一夕歸自外寺僧望兩炬晶熒近接之乃目光也月溪暉公言於多福堪首座曰此子異必振吾宗堪為剃落自後肄業東掖精進教乘三𨵃大藏出遊諸方先往北禪謁北峰印法師次參蔣山琰浙翁北峯住下竺招師歸講論授受冷然有得北峯順寂振錫東還錢丞相作高僧堂以延之年三十三出住陽淡改住天台大慈遷聖水史衛王舉住雲間延慶繼遷鳳山褒親丞相史永公舉住四明延慶海順二師自日本來聽講請所撰讀教記繪師像歸國高麗崔丞相亦致書問佛法大旨乞九祖圖且遺師縹瓷鉢及金硯匣香藥育王虗席郡請兼住辭曰自梁隋已降達磨智者各有宗承舉癡絶冲自代師奪寺園為酒庫師即排包而遁道出東掖兩山學徒歡迎於境上宏齊包公屈致智者真覺重祖庭也理宗聞師名勑住下天竺尋遷上竺補右街鑒義特賜佛光法師進録左街賜金襴袈裟召見倚桂閣對御稱旨時集慶寺成有旨命開山力辭舉白蓮觀主南峰誠法師以代明年誠圓寂特旨轉左右街都僧録令兼住不許辭免御書晦岩二大字賜之師曰開無礙講凡禪教律三宗學徒雲集聞者多所解悟召見延相殿講華嚴經又大書靈山堂以賜遣姪武經即童炎奉震翰歸里東宮成引見後右殿講般若經再賜紫金襴衣齊于明華殿力奏還山度宗即位敕再住上天竺前後閲二十四年平章賈魏公為造塔於寺之東岡奏請額天岩塔院賜田三頃以助香燈是年秋示疾移歸塔院卻藥屏醫作文自祭中秋之夕書偈云仙壽八十我多九年虗空掇轉大用現前擲筆端坐而逝享年八十又九僧臘七十四生於淳凞乙巳七月二十八日終於咸淳八月十五日大弟子妙聲繼席及時舉等四十餘人手度一百餘人奉全身窆以衣髮窆金地天岩墓導初志也次年賜諡普通法師塔曰慈應師以學問之淵博識見之峻拔機鋒之敏捷度量之廓容禪律無不貫通等視幻世不物於物人莫得以涯涘窺宜德表叢林名薄海外上而冕旒簡知下而名公巨卿皆願與交衡台之道至師尤盛有讀教記二十卷行世其餘法語遺文具見別集法師行果號南㵎住天竺靈鷲與湯文清公漢為莫逆交有唱和詩文又乞檜於吳中學士云昨荷許頒蟠檜足仞慨特然非托世契不敢致此請倘蒙踐言遴選二株高大相稱者即授以的俾群目聳觀飛來增勝亦不孤珍賜也云云無文燦禪師祭之以文曰我昔遊長安見公飛來峰下挾病負貪轍煩車殆公授之館餉之泉石納之圖𦘕中倐而來忽而逝公不以久數而厭且殆也緑𬕞青箬西還大江之南今七十年矣量如泰山之納雲氣如春風之著物公風度儀軌耽耽心目間也去年秋伯氏還京師公以書來感慨激越與昔者往來書詞大異既讀而疑曰老子將厭人間世乎何其言之訣也不幾何時前之疑者遂信然矣烏乎悲夫口不必講而心法合於契經衆不必多而光𦦨厭於靈竺貨不必殖而揮斥富於猗頓天地大矣如此人品百年能幾見哉尚記昔者侍坐時升降進退眼中無凡子韻如叔凱清如小山雅如貫卿和如養直顒顒印印應接不暇今三子者已不可作小山深入台雲燦也眩甚亦將槁死江南澤中今北道主人亦不復見矣遙想北山之下疏通岩戶自若也玲瓏臺觀自若也鮮明松桂自若也一世人物能復如昔之盛乎斂不知以何日葬不知以何時塔不知以何地長安故人既不我告天地闊遠欲問無所也我哀無聲我言無文山中猿鶴間應斷魂總庵心法師法嗣法師文杲字如晦姓喻盛氏其先開封人生秀之華亭自號古鏡以母初妊嘗驚窹大圓鏡也早失恃怙慶寧寺僧師訓謂出家可以報德師從之十八受具戒性醇謹一多羅未嘗去體時台宗推總庵心公坦庵英公師遊其間盡究宗旨一夕夢韋天神執雙箭處層閣師欲升未能忽垣庵從旁招之平躋𨆈視皆大教古軸若干親題抄者早起識于慶寧之壁垣庵住天竺靈山請為第一座坦庵聞其提唱嘆曰吾鉢囊有所付矣從容次言及執箭事垣庵曰子神交賢聖晚迭住上下兩竺此其兆乎嘉定戊辰住青鎮廣福塔寺有盜數十擕凶具夜至師略無怖意空所蓄與之嘗謂學不悟則不能洞徹佛意行不密則不能優入聖域是故諸三昧期或七七晝夜歲率為常間舉似總庵之偈曰一隊癡漢患顛四七晝夜不眠費盡娘生氣力分明掘地討天又遷吳王之時思薦福雲間之延慶鳳山之褒親惟廣福前後三至焉壬辰秋詔主天竺靈山端平三年中使齎御奩賜無量壽佛像建閣嚴奉奎章大書其扁昭回雲漢嘉凞己亥上竺虗席京兆端明趙公與權奏無以易文杲詔曰可明年意若有不豫抗章請退先是信人羅氏創寶華院擬師開山至是適副其願上竺挽請益力師乃還天旱大士出明慶寺六月晦師入奏謝丙寅皇帝詣寺請禱師啓白辭意懇切上契震哀駕回而雨即班左街僧録主管教門公事之旨及佛慧法師之號未幾詔主靈山聽學者日不下數千指歲饑雲水之衆無歸獨靈山不戶其入腹皆果然建僧堂以贍衆廣懺室以熏修增置畎畝靡費不舉嘗述住持十針自警不逮務誠實以成智行依定慧以導律儀弘道德以接方來崇梵福以裨國祚量才能以為翊輔合禮義以識安危用悉檀以應衆機儉一己以興百廢明因果以護常住立法度以振紀綱缺一於斯虗名何益端明平齊洪公咨夔見而題曰此古鏡磨鏡法也久後光明透徹似無待磨諸禪莫被老行者熱瞞道不須拂拭時北㵎簡師亦有贊辭又以四無自厲謂然無盡燈續無聲漏坐無生境觀無量壽也柏庭月公以四偈發明其趣嘗疏嚴觀諸師異同會歸于一以啓學者淳祐二年六服乙亥示寂于靈山正𥨊先一日力疾草奏手書訣朝賢或以藥進正色曰世間相常住汝知之手書偈擲筆而逝奉全身塔于月桂峯之右諡其塔曰圓照坐夏五十九享年七十六得度者幾二百人得法者東掖妙湛延慶如益廣福如皎興福懷總先福懷德永寧道彬永福德斌慈感普慧等十餘人嘯岩虎法師法嗣法師智覺號頑空東嘉項氏簪纓之族蚤惠就家孰進倍羣稚十三捨家禮郡之越興寺從定得度甫具戒即白定曰誓學台乘遍依諸老隙地淨几金玉寸陰決志大猷不弄筆墨涼霄雨夕朗誦祖誥曰吾以此代聲律忽感而曰卿先哲廣智法智適也在則人亡則書敢不勉諸歸取二智遺書沉潛反覆砉然解會回視群言如破竹矣往見嘯岩於東掖山岩已默識之從容酬詰尺圍鑰合即俾冠冕多士久之徜徉二竺間柏庭古雲二主翁禮敬優異先後命分其席庭羅致尤勤形諸偈語紹定己丑春有旨以禳禬事宣上竺主僧赴南水門引見庭方在假師居座元得旨代入峻事王音褒嘉賜賚甚渥庭目疾久擬告老表師自代牢讓乃已出世明之超杲濵海凋瘵處旋徙室嚴京尹節齊趙大資以大雄招僅及暮有旨住圓覺學子繩繩雷動蟄奮各隨根器及玄鍵闔開雖老同門叵測首闢大義堂雋徒質疑問難其中滯於言則引之以意味膠於玄則示之以正直方將索之於意味徑直中則舌端河漢濤瀾起伏不使滯一隅矣四處應緣一香未拈有間焉則曰涅槃堂裡看衆莫涯其意當示寂日始撾鼓會衆一瓣為嘯岩償初心也書偈曰六十一年弄巧成拙末後翻身虗空迸裂擲筆而逝僧臘四十七龕留四日闍維頂骨牙齒儼然於燼餘塔藏歸雲之東師傾然而癯頴邁超豁筌名句槖籥深徵當講說時部帙皆屏去惟趺坐默然及臨筵捉麈則庭瓴決隄未足為駛每言三千中道之談乃性德圓具之旨雖胚胎妙經中由智者發其祕法智宏闡深切著明淨覺封執而失諸馴致厥後謬謂三千尅體則當俗諦其毫𨤲千里之謂歟早年假道禪關入太白無際之室與諸老相抑揚故見于講貫者脫灑圓活與執袋上語者大遼邈矣一日講至迦葉聞琴起舞須彌涌沒低昂海水騰波處縱學流之說隨攻破之俟其語窮意盡忽指露柱曰請為諸人說或謂師曰盍著述乎師曰吾不欲屋下架屋因曉之曰夫言所以達意得意忘言言忘則意亦忘名相何有哉龍猛建宗達磨別傳同工而異曲安晚鄭丞相問曰一人發真歸元十方世界悉皆消殞頑空消殞也無師曰向甚處見頑空又曰好箇佛堂未有佛在師曰何處不稱尊存耕趙開府為奏賜真悟大師之號餘公卿以內典問者隨機啓迪皆充然有得焉一衲修然終老孝敬方母病革呻吟師為焚香哀懺即安然而終子夜必盥漱誦經資親於冥寒暑造次不爽把弟隨緣不問榮陋傾鉢勝新建置輟施利周貧急所至皆然此時餘事耳桐洲坦法師法嗣法師永清字夷仲號古源嘉興海鹽人徐氏生嘉定乙亥十一月二十四日在襁褓能稱佛號其母驚異年十二依邑之廣程萬壽寺義公習法華甫三月背誦如流二十剃髮受具戒晨夜禮佛聞華亭延慶桐洲法師學行高世白義往從之五年得其道復見佛光於上竺佛光偉視之遂以為領袖淳祐辛亥出世常熟報慈越十年百廢具舉丘公嶽常公懋即公用雷皆因是知之有捨田伍頃為立觀堂者邑令尹俾文士為之記辛酉遷杭之興福新像設作猊軒講貫無虗日暇則與同志補涅槃經未入科者學徒賴之增置田土以給饘粥聲譽徹聞壬戌召入內道場懺禱有驗賜號祥應法師加紫服甲子冬召至福寧殿講法華稱旨內翰林公希逸贊其繪像云得佛心傳佛口福寧殿上師子吼蓋紀實也甲戌歸舊隱自時厥後世故相仍嘗遭剽掠勑牒伽黎得之水濵為靈山都講歲餘副參楊公鎮疆起住南竺演福嘗與林公論一心三觀林曰欲知智者空中假即是南華周遍咸師以為南華虗無之說豈同三觀真實名義者哉要不可以文字語默會林以偈謝曰誰能會得渠三昧便是宗家老大蟲乃作興其寺瓶立宏規象龍雲會大昌教海自是而始寺右有肇法師講經處名曰白蓮華遺迹猶存寺左有僧史寧僧統塔越在草莾遷於肇之東建堂三間每月八日集同袍四十八人效廬山社修念佛三昧一日語衆曰辨才在上竺年七十遂退歸龍井吾年今已及不可復留亦退歸白蓮華天竺南湖爭致之辭不復往偶行山後卓錫得泉觱沸甘美闢以為池名曰祥應示不忘本也師姿狀瓌秀襟期灑落所至多有建立日誦法華雖老不懈亦有言句傳諸其人自更憂患一味退斂作貧老歌以見志布衣蔬食隨化委順而已隨建四七晝夜法華期懺僅再舉示疾而終辛卯正月十日也壽七十七臘五十七茶毗齒不壞舍利燦然二月四日藏骨肇寧之西中順大夫牟為作塔上之銘有曰昔田命其子曰我死必葬西門豹邊其履行與吾等而王伯鸞宜相近今古源塔近肇寧得非志行之同者歟冶堂模法師法嗣法師子儀鳳山其號也會稽上虞人其父陳在宋知縣溫之樂清為元兵所執不屈而死師在襁褓其母懷抱歸里家益窶十歲依郡之大善寺德公㖟以梵書一覽即默誦又五年祝髮稟戒尋從冶堂於華涇報本習智者教治堂遷台之國清又侍焉悉究其學繼遊錢唐謁雲夢澤公於演福俾綱維其衆由是聲譽驟起嘗手寫法華經三帙其一以墨二用黃金三則出指血也出世餘姚之積慶辨香卒歸冶堂至大初觀光上國高麗瀋王璋王秉意教門傾心內典問法師授據經論談辨雲興引見武宗皇帝降璽書復台之瀑布既領寺事廣興土木更瓶殿宇及佛菩薩天神之像明年朝京賜金納失失伽黎加佛智強範海月寶淨妙慧大師號特命講經三藏試鴻臚卿以冠其首繼奉青宮令旨撰金剛膽巴上師行業傳書成經進同高僧傳入藏賜賚優渥荐沐綸音升住杭之天竺靈山師極力振興犯律軌者擯斥焉持行業者與進焉人多嚴憚之四方學子捿止輪下師皆待以殊禮嘗曰初學難同老成云云纍聀充講乃分內事初學之士離父師棄鄉井非負道念奚能至是吾等據宗師之位不以禮貌汲引使其望涯而退寧不為斷佛種人延祐中瀋王遊江浙集諸山碩德於郡之明慶律寺啓如意輪懺期竣事設伊蒲饌有司供張推王中居高座廁諸山下席法師昌言於前曰今日齊事誰為之審斯禮甚非王者待教門之意即令撤下其座王欣然服從即延諸山上席聞者莫不韙之尋歸越城購別業奉母氏食息其中夷險不貶其志至治初英宗皇帝踐祚入覲被旨再住下天竺名香馹騎絡繹于道錫豫無虗日明年復趨上京寓慶壽寺之西堂名公巨卿從師論道戶外車馬常滿鄈丘李公仲賓吳興子昂趙公漁陽鮮于伯機東陽柳公道傳皆與師交詩文酬唱纍滿卷軸師以母老欽省侍丞欲還里至下邳忽得微疾𮨇謂左右曰吾平昔講貫鮮事利養雖處住持然皆廢弛之餘力莫能興思仰聖上鴻福少展未景今既若此時緣可知而等能以白金奉吾母死無所憾言畢書偈遂卒於舟中是歲丙寅十一月十日也其徒奉遺骨歸葬受經之石奇山世壽八十五僧臘四十三所著有讀教私記其詩文曰天遊集前奎章學士蜀郡虞公為之序師神觀雄邁音吐如鐘英風剛氣震動山嶽自國家崇尚教乘海內宗匠莫不奮躍所長以趨至化故世道益理教法益振師出入禁闥二十年際遇三朝聖君賢相能以吾佛妙說彌縫昌運扶樹教基使東南弘天台之學者金舂玉應為世所重殆非偶然者矣剡源先師法嗣法師允澤字立翁自號雲夢越之剡溪人俗姓求氏師生時伯父夢神人東下輿服導從非常明日瑞彩充幃異香滿室乃娩在褓襁神氣冲裕齠齔類成人不茹世味十四出家于報恩寺投剡源妙悟法師得度明年稟具習法華楞嚴楞伽諸經悉通大義妙悟時主浙東西名剎從學者常數百人師侍巾瓶盡得其道一心三觀之旨洞然無疑年二十九出住崇壽如新發硎上慢退席繼遷廣福起廢歸侵刻石猶在復升延慶講席大啓樓殿𣇄新粥魚齊鼓歲入有加孤山以玄門廢師起而寺復開山之席乃成遠襲國清以禪宗革師出而論定雨華之塵乃授同門基故宮以創興源而規畫之而闡揚之相形勢以演福而指授之而振起之下至姚園五百羅漢寺日崇且闢而綱維之余山建報恩為退處之地龍井創安養為十方學子之歸剡之報恩則又追崇其師之鄉也一皆崇以棟宇入以土田慈恩之報意亦勤矣師凡再詣闕庭世祖神功文武皇帝召見問佛法大旨賜齊香殿授以紅金襴大衣錫佛慧玄辨之號璽書屢降光被諸方便教之冠於禪者實師之功也翰林伯淳張公𫁉為權實之教魁圓頓之宗碩者殆非虗語大德丁酉七月十六日留偈示寂于南竺演福越八日門人奉遺骨塔于龍井之安養春秋六十有七僧夏五十有三得法弟子志安元淨性澄淨真宗渠等四十餘人師歷名剎七復道場二被璽書三其道德之隥重考焰之輝赫一時王公大臣交致問法宗工磌士北面服膺者亦有所自矣夫東屏吾法師法嗣佛光下法師元凱號南叟以南天竺演福第一座出世青鎮廣福初寺西向而紆議開正路以易之三十年弗克底成延祐三年南叟既至以弘教為急務故人從之者日益衆乃架橋芙蓉浦曰翠波疏榛穢直至車溪墓道作門揭其扁曰車溪祖關又搆亭曰景遠所以尊祖也始開正路得大坦平所以繼志也宋大參陳公簡齊奉祠于寺與大儒葉天經詩僧大圓叟洪智講道賦詩作三老亭於浦上既久廢南叟亦即其基作亭以復其舊所以敬賢也翰林待制周仁榮寺記云南叟之行學事業逈異於衆宜所建立克輝前哲故喜道之以為記雲夢澤法師法嗣法師性澄因字以為號曰湛堂家本越之會稽故又以越溪為別號父孫君滿母姜氏夢日輪從空而墮既覺初日正照其榻師遂以生幼有異質四歲戲拈筆為佛像授以經書即能成誦若宿習然至元丙子出家投佛果寺石門殊律師明年祝髮受具戒持法華經以為日課石門謂三世佛法戒為根本而通其遮性雙單制聽止作之義歲乙酉始依佛鑑銛法師為天台之學聞𣇄山講席之盛更往依焉尋歸侍石門時弘公道夫靜公仁叟適相密邇二公皆宗門巨擘朝夕咨扣得益為多逮石門示寂乃謁雲夢澤公於南天竺一見深加器重歷居要職天台國清寺實智者大師行道之所或據而有之且易教為禪師不遠數千里走京師具建置之顛末白于宣政院平復其舊以祕密教不傳於東土因稟戒於膽巴上師既入其室而受覺海圓明之號又從哈尊上師傳修習法門而究其宗旨元貞乙未入覲于上京賜食禁中復以國清為言宣政院為奏請降璽書加護命弘公主之辨正宗緒扶植教基使來者有依庇焉師欲東遊勾麗求天台遺書先上書其國之嗣王而彼國答以無有遂止再詣上京陛辭而歸大德丁酉出世東天竺之興源丁未吳越大旱師為說法禳禱好事之家多為感動指所有以活其不能自食者死無以斂則為掩其遺骸仍作大會普度之至大戊申遷住南天竺之演福郡長官剡上其道行及濟人利物之功于行宣政院者轉聞于朝降璽書加護焉至治壬戌驛召至京師入對明仁殿被旨於青塔寺校正經律論三藏有司供張歲時錫豫為禮殊厚駕幸文殊閣引見問勞賜食正旦及天壽節再朝於大明殿賜以無量壽經挍正事畢特賜金襴袈裟加以御用衣段已給驛券將南還俄有旨即白塔寺建水陸大會亟相東平忠獻王留升座說法衆感悅服事聞寵賚尤渥仍降璽書加護追號佛海大法師一時文學侍從之臣皆賦詩以美之泰定甲子選住上天竺越至順辛未七年矣是歲六月朔撾鼓告衆曰吾三住名山逾三十年自行無益世緣有限雖愧不敏古德風烈猶或可攀即說偈以辨才歸龍井自喻衆固留不可竟拂衣歸南竺雲外齊歲餘東還佛果以終老焉師所至學徒坌集諸方宿衲素有時名者爭趨其座下誨迪獎勵未嘗少怠台乘四書大小部講徹則復始雄談博辨風駛濤湧有疑而未決者折以數語莫不冷然意解晚年薦志淨業晨昏繫念雖病不廢曾屏絶左右修一心不亂觀門七晝夜屢感瑞應至於統領庶務細靡密未始憚煩規制庳陋則增廣瑣之居處弊壞則繕完之資用儉薄則經度之不以其涉於有為而忽之也佛果久廢師歸休其中慨念石門付囑之重罄己槖一新之一日衆以月旦問訊如常時師遽迎之曰老僧向非退間十二年幾在半途今日則有明日則無光陰其可把既乎煩大衆點指行李用表無常衆為念佛師曰止止佛須自念明日却勞送別黎明衆集端坐書偈而逝至正壬午八月二日也春秋七十有八夏六十四奉全身窆于清泰院先是師在上竺創流香塔院以奉開山臻法師洎如法師而肖己像於其左至是分爪髮建塔其中及南竺明靜塔院以為後人展敬之地所著有金剛經集注消灾經注彌陀經句解仁王經如意論呪經科並行於世嗣其法者弘濟本無允若大安善繼等若干人古源清法師法嗣法師蒙潤號玉岡海鹽顧氏父敏隱君子也母強氏祥應法師清公之甥女師方娠母感異夢年十四棄家依清公於白蓮花嘗禮護伽藍神土偶輒仆若答拜然左右皆驚授以經書應口成誦命禮院僧一祥為師祝髮進具從古源受天台家金錍十不二門諸書即能了其大義會古源歸寂又從竹堂傳公以卒其業因苦學嬰奇疾修請觀音懺七七日既獲靈應疾愈而心倍明利勤說勤行自集慶維那分座於演福湛堂澄公來蒞教席號為極盛師升居第一座凡所闡揚辭暢旨顯老成宿學咸敬服焉出世於海鹽德藏長夏講法華經聽者日千餘人屠沽有為之易業者瑞應不可勝紀遷主演福宗風益振居六年退歸白蓮花修念佛三昧依之者益衆日於肇公講堂為說止觀間語其徒曰吾祖智者所謂風烟山水外足忘憂妙慧深禪內充愈樂者其在茲乎自是誓不出山行宣政院強起之主下竺靈山時寺新惟普賢殿巋存因慨然曰吾茲寺成於慈雲一殿尚存則祖師願力有在乃首加葺治次苐構諸堂舍然不以經度程督之勞廢教事晝夜講演無倦色率同志修法華三昧感普賢放光現瑞居三年以涉世將迎幸其素志復歸白蓮老焉至正二年十二月二十六日示寂呼子實法明䇿示止觀安之法且告之曰吾生緣殆盡茲惟其時驟𫁉佛號數考泊然而逝世壽六十八僧臘五十四明年正月三日茶毗得舍利於遺燼中始師無恙時有請預為造塔者以偈謝之曰死後茶毗一幻身盡收白骨煅為塵何須石塔標名字畢竟當初無此人其人遂不敢復請至是門人建塔於風篁嶺下白蓮華院之六唯亭奉舍利藏焉所著有四教儀集注行於世師神資頴秀出於天賦道力純固觀慧虗融志在他有所即應利嘗求古源塔銘於凌陽牟公問以三觀之義其答如響公擊節不已以為聞所未聞每與儒士折衷儒釋所談理性之異同無不嘆其言簡而理盡及於徇緣御物一本於誠所至道俗嚮慕或捨所居或創寺宇以延致之在嘉禾則有演壽吉祥慧光在杭則有壽聖瑞光懺院等至於自行之精進修常坐三昧以九十日為期者七法華光明大悲淨土諸懺法不計期數而潛德密行證語所及有未易淺窺者此特其應迹而已天目中峰國師嘗致書曰法師能以芬陀利香充塞宇宙人謂古佛復出信矣佛海澄法師法嗣法師弘濟字同丹別號天岸紹興餘姚姚氏蚤孤投從父舜田滿禪師出家其祖繼公授以妙經應口能暗誦十六剃染二十進戒持四分律忽自奮曰律可學教不可學乎遂往四明延慶從半山全公習衡台止觀之書嘗修法華金光明淨土期懺在觀定中都智者國師授以犀角如意自是講貫了無留礙時大山公主松江延慶佛海澄公董杭之演福學徒川委並延師居第一座高昌總統般若室利公學通華梵出入經論以本國言與法師譯小止觀文采粲發公深敬服泰定初開法圓覺倡佛海之道自師始兩浙學人奔湊師罄大小部帙晝夜弘演多所啓發明年鹽官洲崩行省亟相脫歡公憂之禱于上竺廣興法事命法師親履其地仍令有司修水陸大會七日夕法師呪以沙水足迹所按土皆凝然至今居民不化魚𩻪者蓋師願力有在也天曆改元升住大集慶歲饑喟然嘆曰吾教雖以食為外命其如四衆何即退處別室吳人以疏幣來聘師誘掖來學留姑蘇者六夏至元再紀之五年郡以圓通久廢屈師主之則曰先德弘化報地主恩為重越吾父母欣然應聘至焉糧食闢齊舍攝徒侶至數千指隘無以容咸謂茲山自開香嚴重興後五十年無此作四載又謝事旋故丘專修念佛三昧當會心處不知念而非念非念而念也扁室曰其中著銘以自見至正七年年八十矣杭三宗又以大普福起之師堅臥不赴門人法航請曰圓頓大教退藏於密久矣不在此時作某等龜鏡將抱終身之憾乃束裝徑度居亡何海內兵興竟拂衣還山開清鏡閣而深蟄焉龍翔笑隱欣公有詩美之嘗閲楞嚴經古注繁簡不倫方將折衷其說俄疾作進諸徒申淨土法門有未解師意者師厲聲曰死生難頃之書偈而逝至正十六年三月十日也世壽八十六僧夏七十一嗣法上首上竺道臻超果允中雍熙淨琛圓通有傳等先是師卜地受經之西崦植松其上標曰松華塢其法孫至大以陶器奉蛻質焉導治命也師狀貌魁偉言吐灑然魯誥竺墳過目不忘緇白無貴賤爭導事之平日以疏通教觀為務講法華妙義無慮百十會若杭城東之吉祥西湖之崇福獲之南翔大德皆有瑞徵感天雨花集賢仁榮周公曰法師才贍而言約器宏而道深安陽明善韓公曰師才全學博以文寓意無求於名觀二先生之言可以知師之為人矣所著有四教儀紀要天岸外集並行於世至若上堂題贊詩頌時𫁉獨步不俟編集傳諸人人焉法師本無字極元或以其宴居之扁𫁉為我菴台之黃岩著族姓陳氏父自然素業儒其高曾皆以科舉取顯仕父早世母趙清獻公抃四世孫賢而知書師在髫齓母課之語孟殊進年十三依方山寶禪師於瑞岩為落髮受具柢中竺元叟端禪師留居侍旁時佛海澄公住演福而寺之方山大公佐焉實師母黨親每過候之輒以老病相屬托遮挽不聽去咄曰佛法隨緣若果無情耶會澄公亦問以山家教義開其意玉岡潤公從臾其間師由是無它志篝燈達曙深契二威緘授之妙而荊溪四明記述之詳過目皆能口辨指畫以極其淵奧故任之紀綱而衆濟其才位之表率而衆熏其德嘗曰文字之學必待靜默而後有所悟入師得之矣俄以宣政院檄出住鳳山崇壽繼遷普福及明之延慶詔書法旨纍加漿譽授以佛護宣覺憲慈匡道之號時教法大行簦笈趨擁鼓聲籤顯靡間晝夜其智謀幹力有餘地則理産業飾佛像起頽仆為壯麗事蹟見所在刻若以金新昌彌勒像板集注楞嚴經亦其化風所致師性姿高潔所交多名士大夫若屬文議論雄拔有山意集行世尤不耐紛稍遇之則引避𮨇延慶酬應煩劇即築溪舍南湖上以老焉至正二年納麟高公使行院起師住上天竺三年癸未示寂世壽五十八臘四十二門人以其遺體塔于上竺之流香別院嗣法弘道慧隱允中大始等法師允若字季蘅族相里氏父慶以儒行𫁉師九歲能通春秋其父方以亢宗為期忽翛然有出塵之想乃依雲門廣孝元公祝髮十五納滿分戒渡江至虎林謁大山師於興福授以天台諸乘即知大意已而聞佛海澄公主南竺演福四方名德多來棲止而方岩則師愛山靜師尤龍象中𫁉雄者師復住依焉凡法智立陰觀妄別理隨緣究竟蛣𧏙理毒性惡等文益推斥其義而沉涵之至於恩清之兼業昭圓之異說齊潤之黨邪仁嶽之背正亦皆察其非是及所以害道之故心既有得乃質之二師而復取正於澄公聲入心通解行日著澄公甚器之俾歷要職至治初澄公奉詔入燕都挍正經律論三藏遂白其行業於帝師大寶法王錫以慈光圓照法師之號大德中出世昌源淨聖丁歲侵師為經度之田之菜蕪者闢之室之弊漏者葺之踰三年演福請師居第一座攝衆千餘人師持規峻整升堂入室具有儀範經其指示多所悟入泰定中行宣政院請主興福當是時倡道杭之南北兩山者若天岸濟我庵無玉庭罕與師皆有重望人𫁉為佛海四天王居無何退皈雲門與斷江恩師體耕逸師翱翔千岩萬嶽中人又目之為雲門三高至正間起主越之圓通亟相康里公具疏延主下竺靈山有瓔珞泉其涸已久師持錫扣岩祝曰吾緣苟在是泉當為吾一來言始脫口泉果涌出戶部尚書貢公師泰比之慈雲重榮檜命名曰再來泉作文記之師四坐道場教雨灌溉如甘露醍醐飲者心泰尋以年高退居雲門築深居精舍以法華觀慧三昧為暮年淨行會天下亂干戈紛擾師與之遇脅以白刃毅然不為屈因遇害白乳溢於地實至正己亥二月二十九日世壽八十僧夏五十有五兵既退其徒孫息幻具衣棺為斂闍維之夕獲舍利甚夥塔于雲門之麓師風度簡遠不妄言笑趙魏公孟俯呼之為僧中御史善詩若文雄健有法黃文獻公溍為序其首謂其遊戲如幻變化不測理事混融不相留礙一時名公卿如鄧文肅公袁文清公虞文靖公韓莊節公皆與師方外交而忠介公泰不華歆豔為尤切函書問道殆無虗日雲門之旁有若耶溪世以法師名高宜配地望故復稱之為若耶溪嗣其法者則集慶友奎演福良謹等或者以師素履之美而不獲考終命頗致疑焉殊不知定業所感千劫弗遷雖以西域聖師深入神通三昧或為鴆毒所加或罹刀劍之厄卒未能免何傷乎道德之高也法師善繼字絶宗族婁氏越之諸暨人母王氏當有妊夢神人授白芙蕖乃生始能言見母持佛號合掌隨聲和之年稍長季父客授山陰靈祕寺從治春秋經竊窺三藏諸書嘆曰春秋乃世間法欲求出世非釋氏將疇依即投其寺僧思恭祝髮授具戒從杭之興福大山公習天台教觀時大山遷雲間延慶師復往南竺演福從湛堂澄公間問之曰十不二門屬何觀法師曰三種觀法屬對三部此文既與止觀同成觀體的是從行又問諸經之體為迷為悟師曰體非迷悟迷悟由人顧所詮經之旨何如耳湛堂喜溢顏色曰真法輪將它日有望於子矣宗周文公時住集慶豔師之學延曲賓師尋領懺事湛堂復招師居座端南竺素稱教海師提唱宗乘有聲絶出於四方會湛堂遷上竺而玉岡潤公來補其處仍留師居其職學徒四集無不涵腴飲醇克足而後去天曆己巳出往良渚大雄日講金光明經夢法智謂之曰汝所談經與吾若合符節惜乎所踐猶未逮其言耳遂益篤精進之行至正壬午高公納麟為宣政院使移住天竺薦福丙戌江浙行省左亟相朵爾只公領院事升住天台能仁凡三主名剎執經輪下者多豪俊之士開闡法華妙玄文句五章四釋奧義昭晣且䇿勵之曰吾祖有云止觀一部即法華三昧之筌十乘十觀即法華三昧之正體須解行並馳正助兼運則圓位可登而不負吾祖命家之意未幾兵難荐作其高弟是乘請師還華經歡然就之且以無常迅速嚴修淨業繫念佛名晝夜不輟一日集衆而言曰佛祖弘化貴乎時節因緣緣與時違化將焉托吾其歸矣遂索筆書偈端坐而逝時丁酉七月二十二日也春秋七十有二夏六十三火化齒牙及舌根不壞舍利纍纍然斂骨塔于靈祕之西坡嗣其法者靈鷲懷古延慶自明崇壽是乘演福如玘能仁淨昱等師氣局衍裕行履固純山家諸書無不精徹大江東南推為教中之宗講演法華金光明凡若干會主修懺期所感靈異不一是乘嘗請著書以淑後人師曰吾宗本離言說不得已而有言為彰授受也是故章安結集之後不過代相緘授其間或有斥邪衛正者亦豈好辨哉今大經大法粲如日星宜修習不暇奚俟豫言聞者悅脫
